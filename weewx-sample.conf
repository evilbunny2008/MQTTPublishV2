[MQTTPublish]
    enable = true
    log_mqtt = false
    max_retries = 9999
    max_thread_restarts = 9999
    clientid = weewx_clientid
    host = mqtt.example.com
    keepalive = 60
    port = 8883
    protocol = MQTTv5
    username = ""
    password = ""
    
    [[tls]]
        enable = true
        ca_certs = /etc/ssl/certs/ca-certificates.crt
        certfile = None
        certs_required = required
        ciphers = None
        keyfile = None
        tls_version = tlsv12
    
    [[topics]]
        [[[website/loop]]]
            publish = true
            type = json
            binding = loop
            qos = 1
            retain = True
            unit_system = METRICWX
            ignore = true
            append_unit_label = false
            publish_none_value = true
            
            [[[[fields]]]]
                [[[[[dateTime]]]]]
                    ignore = false
                
                [[[[[appTemp]]]]]
                    ignore = false
                
                [[[[[barometer]]]]]
                    ignore = false
                
                [[[[[cloudbase]]]]]
                    ignore = false
                
                [[[[[dewpoint]]]]]
                    ignore = false
                
                [[[[[ET_since_last_archive]]]]]
                    ignore = false
                
                [[[[[inHumidity]]]]]
                    ignore = false
                
                [[[[[inTemp]]]]]
                    ignore = false
                
                [[[[[outHumidity]]]]]
                    ignore = false
                
                [[[[[outTemp]]]]]
                    ignore = false
                
                [[[[[radiation]]]]]
                    ignore = false
                
                [[[[[rain_since_last_archive]]]]]
                    ignore = false
                
                [[[[[THSW]]]]]
                    ignore = false
                
                [[[[[UV]]]]]
                    ignore = false
                
                [[[[[windGustDir1]]]]]
                    ignore = false
                    name = windGustDir
                    group = group_direction
                
                [[[[[windGustDir2]]]]]
                    ignore = false
                    name = windGustDir
                    group = group_direction
                
                [[[[[windGust]]]]]
                    ignore = false
                    unit = km_per_hour
                
                [[[[[windSpeed]]]]]
                    ignore = false
                    unit = km_per_hour
        
        [[[website/archive]]]
            publish = true
            type = json
            binding = archive
            qos = 1
            retain = True
            unit_system = METRICWX
            ignore = true
            append_unit_label = false
            publish_none_value = true
            
            [[[[fields]]]]
                [[[[[dateTime]]]]]
                    ignore = false
                
                [[[[[barometer]]]]]
                    ignore = false
                
                [[[[[cloudbase]]]]]
                    ignore = false
                
                [[[[[consBatteryVoltage]]]]]
                    ignore = false
                
                [[[[[dewpoint]]]]]
                    ignore = false
                
                [[[[[inHumidity]]]]]
                    ignore = false
                
                [[[[[inTemp]]]]]
                    ignore = false
                
                [[[[[interval]]]]]
                    ignore = false
                
                [[[[[outHumidity]]]]]
                    ignore = false
                
                [[[[[outTemp]]]]]
                    ignore = false
                
                [[[[[radiation]]]]]
                    ignore = false
                
                [[[[[rainRate]]]]]
                    ignore = false
                
                [[[[[UV]]]]]
                    ignore = false
                
                [[[[[rxCheckPercent]]]]]
                    ignore = false
                
                [[[[[barometer_diff]]]]]
                    ignore = false
                
                [[[[[dewpoint_diff]]]]]
                    ignore = false
                
                [[[[[inHumidity_diff]]]]]
                    ignore = false
                
                [[[[[inTemp_diff]]]]]
                    ignore = false
                
                [[[[[outHumidity_diff]]]]]
                    ignore = false
                
                [[[[[outTemp_diff]]]]]
                    ignore = false
        
        
        [[[website/stats]]]
            publish = true
            type = json
            binding = archive
            qos = 1
            retain = True
            unit_system = METRICWX
            ignore = true
            minmax = both
            append_unit_label = false
            publish_none_value = true
            day = true
            yesterday = true
            month = true
            last_month = true
            year = true
            last_year = true
            
            [[[[fields]]]]
                [[[[[barometer]]]]]
                    ignore = false
                
                [[[[[dewpoint]]]]]
                    ignore = false
                
                [[[[[ET]]]]]
                    ignore = false
                    minmax = sum
                
                [[[[[inHumidity]]]]]
                    ignore = false
                
                [[[[[inTemp]]]]]
                    ignore = false
                
                [[[[[outHumidity]]]]]
                    ignore = false
                
                [[[[[outTemp]]]]]
                    ignore = false
                
                [[[[[radiation]]]]]
                    ignore = false
                    minmax = max
                
                [[[[[rain]]]]]
                    ignore = false
                    minmax = sum
                
                [[[[[UV]]]]]
                    ignore = false
                    minmax = max
                
                [[[[[wind]]]]]
                    ignore = false
