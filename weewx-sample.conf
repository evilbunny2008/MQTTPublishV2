[MQTTPublishV2]
    enable = true
    log_mqtt = false
    max_retries = 9999
    max_thread_restarts = 9999
    host = mqtt.example.com
    keepalive = 60
    port = 8883
    protocol = MQTTv5
    username = username
    password = password
    
    [[tls]]
        enable = true
        ca_certs = /etc/ssl/certs/ca-certificates.crt
        certs_required = required
        tls_version = tlsv12
    
    [[topics]]
        [[[website/loop]]]
            publish = true
            type = json
            binding = loop
            qos = 1
            retain = True
            unit_system = METRICWX
            ignore = true
            append_unit_label = false
            publish_none_value = true
            
            [[[[fields]]]]
                [[[[[dateTime]]]]]
                    ignore = false
                
                [[[[[appTemp]]]]]
                    ignore = false
                
                [[[[[barometer]]]]]
                    ignore = false
                
                [[[[[cloudbase]]]]]
                    ignore = false
                
                [[[[[dewpoint]]]]]
                    ignore = false
                
                [[[[[ET_since_last_archive]]]]]
                    ignore = false
                
                [[[[[inHumidity]]]]]
                    ignore = false
                
                [[[[[inTemp]]]]]
                    ignore = false
                
                [[[[[outHumidity]]]]]
                    ignore = false
                
                [[[[[outTemp]]]]]
                    ignore = false
                
                [[[[[radiation]]]]]
                    ignore = false
                
                [[[[[rain_since_last_archive]]]]]
                    ignore = false
                
                [[[[[THSW]]]]]
                    ignore = false
                
                [[[[[UV]]]]]
                    ignore = false
                
                [[[[[windGust]]]]]
                    ignore = false
                    unit = km_per_hour
                    conversion_type = float
                
                [[[[[windGustDir]]]]]
                    ignore = false
                    name = windGustDir
                    conversion_type = integer
                
                [[[[[windGustDir_str]]]]]
                    ignore = false
                    name = windGustDir
                    conversion_type = ordinal_compass
                
                [[[[[windSpeed]]]]]
                    ignore = false
                    unit = km_per_hour
                    conversion_type = float
                
                [[[[[windDir]]]]]
                    ignore = false
                    name = windDir
                    conversion_type = integer
                
                [[[[[windDir_str]]]]]
                    ignore = false
                    name = windDir
                    conversion_type = ordinal_compass
        
        [[[website/archive]]]
            publish = true
            type = json
            binding = archive
            qos = 1
            retain = True
            unit_system = METRICWX
            ignore = true
            append_unit_label = false
            publish_none_value = true
            
            [[[[fields]]]]
                [[[[[dateTime]]]]]
                    ignore = false
                
                [[[[[barometer]]]]]
                    ignore = false
                
                [[[[[cloudbase]]]]]
                    ignore = false
                
                [[[[[consBatteryVoltage]]]]]
                    ignore = false
                
                [[[[[dewpoint]]]]]
                    ignore = false
                
                [[[[[inHumidity]]]]]
                    ignore = false
                
                [[[[[inTemp]]]]]
                    ignore = false
                
                [[[[[interval]]]]]
                    ignore = false
                
                [[[[[outHumidity]]]]]
                    ignore = false
                
                [[[[[outTemp]]]]]
                    ignore = false
                
                [[[[[radiation]]]]]
                    ignore = false
                
                [[[[[rainRate]]]]]
                    ignore = false
                
                [[[[[UV]]]]]
                    ignore = false
                
                [[[[[rxCheckPercent]]]]]
                    ignore = false
                
                [[[[[barometer_diff]]]]]
                    ignore = false
                
                [[[[[dewpoint_diff]]]]]
                    ignore = false
                
                [[[[[inHumidity_diff]]]]]
                    ignore = false
                
                [[[[[inTemp_diff]]]]]
                    ignore = false
                
                [[[[[outHumidity_diff]]]]]
                    ignore = false
                
                [[[[[outTemp_diff]]]]]
                    ignore = false
        
        
        [[[website/stats]]]
            publish = true
            type = json
            binding = archive
            qos = 1
            retain = True
            unit_system = METRICWX
            ignore = true
            minmax = both
            append_unit_label = false
            publish_none_value = true
            day = true
            yesterday = true
            month = true
            last_month = true
            year = true
            last_year = true
            alltime = true
            
            [[[[fields]]]]
                [[[[[dateTime]]]]]
                    ignore = false
                
                [[[[[barometer]]]]]
                    ignore = false
                
                [[[[[dewpoint]]]]]
                    ignore = false
                
                [[[[[ET]]]]]
                    ignore = false
                    minmax = sum
                
                [[[[[inHumidity]]]]]
                    ignore = false
                
                [[[[[inTemp]]]]]
                    ignore = false
                
                [[[[[outHumidity]]]]]
                    ignore = false
                
                [[[[[outTemp]]]]]
                    ignore = false
                
                [[[[[radiation]]]]]
                    ignore = false
                    minmax = max
                
                [[[[[rain]]]]]
                    ignore = false
                    minmax = sum
                
                [[[[[UV]]]]]
                    ignore = false
                    minmax = max
                
                [[[[[wind]]]]]
                    ignore = false
    
    [[lwt]]
        enable = false
        topic = status
        online_payload = online
        offline_payload = offline
        qos = 0
        retain = true
